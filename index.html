<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Koji Pro Adventure - Double Jump Edition</title>
    <style>
        * { box-sizing: border-box; touch-action: none; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: 'Arial', sans-serif; overflow: hidden; }
        
        #game-container { position: relative; width: 100%; max-width: 800px; aspect-ratio: 4/3; background: #4dbfff; border: 4px solid #333; overflow: hidden; }
        canvas { width: 100%; height: 100%; display: block; image-rendering: pixelated; }

        /* UI Styling */
        #hud { position: absolute; top: 10px; left: 10px; z-index: 20; pointer-events: none; }
        .hud-box { background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 12px; border: 2px solid gold; }
        .score-text { color: gold; font-size: 20px; font-weight: bold; margin-bottom: 5px; }
        .health-bar { font-size: 22px; }

        /* Modern Controls - Diletakkan di bawah Game agar tidak menutupi layar */
        #controls { width: 100%; max-width: 800px; display: flex; justify-content: space-between; padding: 20px; background: #111; }
        .d-pad { display: flex; gap: 15px; }
        .btn { width: 70px; height: 70px; background: #333; border: 3px solid #eee; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; font-size: 30px; user-select: none; }
        .btn:active { background: #666; transform: scale(0.9); }
        .btn-jump { background: #d4a017; border-color: gold; width: 85px; height: 85px; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="hud">
        <div class="hud-box">
            <div class="score-text">🍌 SCORE: <span id="scoreVal">0</span></div>
            <div class="health-bar" id="livesVal">❤️❤️❤️</div>
        </div>
    </div>
    <canvas id="gameCanvas"></canvas>
</div>

<div id="controls">
    <div class="d-pad">
        <div class="btn" id="btnLeft">◀</div>
        <div class="btn" id="btnRight">▶</div>
    </div>
    <div class="btn btn-jump" id="btnUp">▲</div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 800;
    canvas.height = 600;

    // Assets
    const assets = {
        koji: new Image(), banana: new Image(), enemy: new Image(),
        stone: new Image(), bg: new Image(), potion: new Image()
    };
    assets.koji.src = 'koji.png';
    assets.banana.src = 'banana.png';
    assets.enemy.src = 'enemy.png';
    assets.stone.src = 'stone.png';
    assets.bg.src = 'background.png';
    assets.potion.src = 'ramuan.png';

    // Game Constants
    const worldHeight = 4000;
    let cameraY = worldHeight - 600;
    let score = 0;
    let lives = 3;
    let invul = 0;
    let gameFrame = 0;
    let particles = [];

    // Player Object
    const koji = {
        x: 400, y: worldHeight - 150, w: 70, h: 70,
        vx: 0, vy: 0, speed: 8, g: 0.8,
        jumpPower: -16,
        jumpsLeft: 2, // Fitur Double Jump
        grounded: false, dir: 1
    };

    // Level Building
    let platforms = [];
    let bananas = [];
    let enemies = [];

    function buildLevel() {
        platforms = [{ x: 0, y: worldHeight - 40, w: 800, h: 40 }]; // Ground
        
        for (let i = 1; i < 25; i++) {
            let py = (worldHeight - 150) - (i * 155); // Jarak antar lantai stabil
            let pw = 150 + Math.random() * 100;
            let px = Math.random() * (800 - pw);
            
            let plat = { x: px, y: py, w: pw, h: 25, move: i % 4 === 0, dir: 1, range: 150, startX: px };
            platforms.push(plat);

            // Item placement
            bananas.push({ x: px + pw/2 - 20, y: py - 50, w: 40, h: 40, active: true });

            // Enemy placement - Dibuat lebih sering muncul
            if (i > 2 && i % 3 === 0) {
                enemies.push({ x: px, y: py - 55, w: 55, h: 55, startX: px, range: pw - 55, speed: 2, dir: 1 });
            }
        }
    }
    buildLevel();

    // Input Controller
    const keys = {};
    window.addEventListener('keydown', e => {
        if (e.code === 'ArrowUp') handleJump();
        keys[e.code] = true;
    });
    window.addEventListener('keyup', e => keys[e.code] = false);

    function handleJump() {
        if (koji.jumpsLeft > 0) {
            koji.vy = koji.jumpPower;
            koji.jumpsLeft--;
            koji.grounded = false;
            spawnPart(koji.x + 35, koji.y + 70, '#fff', 8);
        }
    }

    // Touch Controls
    function bindTouch(id, code) {
        const btn = document.getElementById(id);
        btn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (code === 'ArrowUp') handleJump();
            keys[code] = true;
        });
        btn.addEventListener('touchend', () => keys[code] = false);
    }
    bindTouch('btnLeft', 'ArrowLeft'); bindTouch('btnRight', 'ArrowRight'); bindTouch('btnUp', 'ArrowUp');

    function spawnPart(x, y, color, n) {
        for(let i=0; i<n; i++) particles.push({ x, y, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10, life: 20, color });
    }

    function update() {
        gameFrame++;
        if (invul > 0) invul--;

        // Movement
        if (keys['ArrowLeft']) { koji.vx = -koji.speed; koji.dir = -1; }
        else if (keys['ArrowRight']) { koji.vx = koji.speed; koji.dir = 1; }
        else { koji.vx *= 0.8; }
        
        koji.x += koji.vx;
        koji.vy += koji.g;
        koji.y += koji.vy;

        // Collision Bounds
        if (koji.x < 0) koji.x = 0;
        if (koji.x > 730) koji.x = 730;

        // Platform Collision
        koji.grounded = false;
        platforms.forEach(p => {
            if (p.move) {
                p.x += p.speed * p.dir;
                if (p.x > p.startX + p.range || p.x < p.startX - 50) p.dir *= -1;
            }
            if (koji.vy > 0 && koji.y + koji.h >= p.y && koji.y + koji.h <= p.y + 20 && koji.x + 50 > p.x && koji.x < p.x + p.w) {
                koji.y = p.y - koji.h;
                koji.vy = 0;
                koji.grounded = true;
                koji.jumpsLeft = 2; // Reset jump saat mendarat
                if (p.move) koji.x += p.speed * p.dir;
            }
        });

        // Camera
        let targetY = koji.y - 300;
        cameraY += (targetY - cameraY) * 0.1;
        cameraY = Math.max(0, Math.min(worldHeight - 600, cameraY));

        // Items
        bananas.forEach(b => {
            if (b.active && koji.x < b.x + b.w && koji.x + koji.w > b.x && koji.y < b.y + b.h && koji.y + koji.h > b.y) {
                b.active = false; score++; document.getElementById('scoreVal').innerText = score;
                spawnPart(b.x+20, b.y+20, 'gold', 10);
            }
        });

        // Enemy Logic
        enemies.forEach(e => {
            e.x += e.speed * e.dir;
            if (e.x > e.startX + e.range || e.x < e.startX) e.dir *= -1;
            if (invul === 0 && koji.x < e.x + e.w - 10 && koji.x + koji.w > e.x + 10 && koji.y < e.y + e.h && koji.y + koji.h > e.y) {
                lives--; invul = 60;
                document.getElementById('livesVal').innerText = "❤️".repeat(lives);
                spawnPart(koji.x+35, koji.y+35, 'red', 15);
                if (lives <= 0) location.reload();
            }
        });

        particles.forEach((p, i) => { p.x += p.vx; p.y += p.vy; p.life--; if (p.life <= 0) particles.splice(i, 1); });
    }

    function draw() {
        ctx.fillStyle = '#4dbfff';
        ctx.fillRect(0, 0, 800, 600); // Clear Screen

        ctx.save();
        ctx.translate(0, -cameraY);

        // Background
        if (assets.bg.complete) {
            for (let i = 0; i < worldHeight; i += 600) ctx.drawImage(assets.bg, 0, i, 800, 600);
        }

        // Platforms
        platforms.forEach(p => {
            ctx.fillStyle = '#444';
            ctx.fillRect(p.x, p.y, p.w, p.h);
            if (assets.stone.complete) {
                for (let x = 0; x < p.w; x += 40) ctx.drawImage(assets.stone, p.x + x, p.y, 40, p.h);
            }
        });

        // Entities
        bananas.forEach(b => { if (b.active && assets.banana.complete) ctx.drawImage(assets.banana, b.x, b.y + Math.sin(gameFrame*0.1)*5, b.w, b.h); });
        enemies.forEach(e => { if (assets.enemy.complete) ctx.drawImage(assets.enemy, e.x, e.y, e.w, e.h); });

        // Koji
        if (invul % 10 < 5 && assets.koji.complete) {
            ctx.save();
            if (koji.dir === -1) { ctx.translate(koji.x + koji.w, koji.y); ctx.scale(-1, 1); ctx.drawImage(assets.koji, 0, 0, koji.w, koji.h); }
            else { ctx.drawImage(assets.koji, koji.x, koji.y, koji.w, koji.h); }
            ctx.restore();
        }

        // Particles
        particles.forEach(p => { ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, 4, 4); });

        ctx.restore();
    }

    function loop() { update(); draw(); requestAnimationFrame(loop); }
    loop();
</script>
</body>
</html>
