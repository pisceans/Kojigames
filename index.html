<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Koji Adventure V2</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #1a1a1a; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; font-family: Arial, sans-serif; }
        canvas { border: 3px solid #fff; max-width: 95%; height: auto; background-color: #4dbfff; }
        #ui { position: absolute; top: 15px; left: 15px; color: white; text-shadow: 2px 2px black; z-index: 10; pointer-events: none; }
        .hearts { color: #ff4d4d; font-size: 24px; margin-top: 5px; }
        .controls { position: fixed; bottom: 20px; right: 20px; display: grid; grid-template-columns: repeat(3, 65px); gap: 10px; }
        .btn { background: rgba(255,255,255,0.3); border: 2px solid #fff; border-radius: 10px; height: 65px; display: flex; justify-content: center; align-items: center; color: white; font-size: 25px; user-select: none; }
        .btn:active { background: rgba(255,255,255,0.6); }
    </style>
</head>
<body>

<div id="ui">
    <div style="font-size: 20px;">🍌 Skor: <span id="score">0</span></div>
    <div class="hearts" id="lives">❤️ ❤️ ❤️</div>
</div>

<canvas id="gameCanvas" width="800" height="400"></canvas>

<div class="controls">
    <div class="btn" style="grid-column: 2" id="btnUp">▲</div>
    <div class="btn" style="grid-column: 1; grid-row: 2" id="btnLeft">◀</div>
    <div class="btn" style="grid-column: 3; grid-row: 2" id="btnRight">▶</div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const img = {
        koji: new Image(), banana: new Image(), enemy: new Image(),
        stone: new Image(), bg: new Image()
    };
    
    // Pastikan nama file ini kecil semua sesuai di GitHub kamu
    img.koji.src = 'koji.png';
    img.banana.src = 'banana.png';
    img.enemy.src = 'enemy.png';
    img.stone.src = 'stone.png';
    img.bg.src = 'background.png';

    let score = 0;
    let lives = 3;
    let invul = 0;
    let tick = 0;
    let keys = {};

    let koji = { x: 50, y: 300, w: 70, h: 70, dy: 0, jump: -15, speed: 6, g: 0.8, grounded: false };

    // LANTAI BERTINGKAT (Agar bisa naik ke atas)
    let platforms = [
        { x: 0, y: 380, w: 800, h: 20 },   // Dasar
        { x: 100, y: 280, w: 200, h: 15 }, // Lantai 1
        { x: 450, y: 220, w: 200, h: 15 }, // Lantai 2
        { x: 150, y: 140, w: 250, h: 15 }, // Lantai 3
        { x: 500, y: 90, w: 200, h: 15 }   // Lantai 4
    ];

    let bananas = [
        { x: 180, y: 220, w: 35, h: 35, collected: false },
        { x: 550, y: 160, w: 35, h: 35, collected: false },
        { x: 200, y: 80, w: 35, h: 35, collected: false }
    ];

    let enemies = [
        { x: 450, y: 175, w: 45, h: 45, speed: 2, range: 150, startX: 450 },
        { x: 100, y: 335, w: 45, h: 45, speed: 1.5, range: 300, startX: 100 }
    ];

    // Input mobile & keyboard
    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);

    function handleBtn(id, code) {
        const b = document.getElementById(id);
        b.onmousedown = b.ontouchstart = (e) => { e.preventDefault(); keys[code] = true; };
        b.onmouseup = b.ontouchend = (e) => { e.preventDefault(); keys[code] = false; };
    }
    handleBtn('btnUp', 'ArrowUp'); handleBtn('btnLeft', 'ArrowLeft'); handleBtn('btnRight', 'ArrowRight');

    function update() {
        tick++;
        if (invul > 0) invul--;

        if (keys['ArrowLeft'] && koji.x > 0) koji.x -= koji.speed;
        if (keys['ArrowRight'] && koji.x < canvas.width - koji.w) koji.x += koji.speed;
        if (keys['ArrowUp'] && koji.grounded) { koji.dy = koji.jump; koji.grounded = false; }

        koji.dy += koji.g;
        koji.y += koji.dy;

        // Logika Berdiri di Lantai
        koji.grounded = false;
        platforms.forEach(p => {
            if (koji.dy >= 0 && koji.y + koji.h <= p.y + p.h && koji.y + koji.h >= p.y - 5 &&
                koji.x + koji.w > p.x && koji.x < p.x + p.w) {
                koji.y = p.y - koji.h;
                koji.dy = 0;
                koji.grounded = true;
            }
        });

        // Tabrakan Musuh & Nyawa
        enemies.forEach(e => {
            e.x += e.speed;
            if (e.x > e.startX + e.range || e.x < e.startX) e.speed *= -1;
            if (invul === 0 && koji.x < e.x + e.w && koji.x + koji.w > e.x && koji.y < e.y + e.h && koji.y + koji.h > e.y) {
                lives--;
                invul = 60; // Kebal 1 detik
                let hStr = ""; for(let i=0; i<lives; i++) hStr += "❤️ ";
                document.getElementById('lives').innerText = hStr;
                if (lives <= 0) { alert("Game Over!"); location.reload(); }
            }
        });

        // Pisang melayang
        bananas.forEach((b, i) => {
            if (!b.collected) {
                b.animY = b.y + Math.sin((tick + i * 20) * 0.1) * 8;
                if (koji.x < b.x + b.w && koji.x + koji.w > b.x && koji.y < b.animY + b.h && koji.y + koji.h > b.animY) {
                    b.collected = true; score++; document.getElementById('score').innerText = score;
                }
            }
        });
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (img.bg.complete) ctx.drawImage(img.bg, 0, 0, canvas.width, canvas.height);

        platforms.forEach(p => {
            ctx.fillStyle = "rgba(0,0,0,0.2)";
            ctx.fillRect(p.x, p.y, p.w, p.h);
            if (img.stone.complete) {
                for(let x=p.x; x<p.x+p.w; x+=30) ctx.drawImage(img.stone, x, p.y, 30, p.h);
            }
        });

        bananas.forEach(b => { 
            if (!b.collected && img.banana.complete) ctx.drawImage(img.banana, b.x, b.animY || b.y, b.w, b.h); 
        });

        enemies.forEach(e => { if (img.enemy.complete) ctx.drawImage(img.enemy, e.x, e.y, e.w, e.h); });

        if (invul % 10 < 5 && img.koji.complete) {
            ctx.drawImage(img.koji, koji.x, koji.y, koji.w, koji.h);
        }
    }

    function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
    img.bg.onload = gameLoop;
</script>
</body>
</html>
