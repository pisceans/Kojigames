<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Koji Pro Adventure - Fixed Edition</title>
    <style>
        * { box-sizing: border-box; touch-action: none; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; height: 100vh; font-family: sans-serif; overflow: hidden; }
        
        /* Game Screen */
        #game-container { position: relative; width: 100vw; height: 70vh; background: #4dbfff; overflow: hidden; border-bottom: 4px solid #333; }
        canvas { width: 100%; height: 100%; display: block; image-rendering: pixelated; }

        /* UI Hud */
        #hud { position: absolute; top: 10px; left: 10px; z-index: 20; pointer-events: none; }
        .hud-box { background: rgba(0,0,0,0.6); padding: 10px; border-radius: 10px; border: 2px solid gold; color: white; }
        .score { color: gold; font-weight: bold; font-size: 18px; }
        .lives { font-size: 20px; margin-top: 5px; }

        /* Tombol Navigasi (Layout Awal) */
        #controls { width: 100%; height: 30vh; background: #1a1a1a; display: flex; justify-content: space-between; align-items: center; padding: 0 25px; }
        .move-group { display: flex; gap: 20px; }
        .btn { width: 85px; height: 85px; background: #444; border: 4px solid #fff; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; font-size: 35px; }
        .btn:active { background: #777; transform: scale(0.9); }
        .jump-btn { background: #ffae00; width: 100px; height: 100px; border-color: gold; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="hud">
        <div class="hud-box">
            <div class="score">🍌 SCORE: <span id="scoreVal">0</span></div>
            <div id="livesVal" class="lives">❤️❤️❤️</div>
        </div>
    </div>
    <canvas id="gameCanvas"></canvas>
</div>

<div id="controls">
    <div class="move-group">
        <div class="btn" id="btnLeft">◀</div>
        <div class="btn" id="btnRight">▶</div>
    </div>
    <div class="btn jump-btn" id="btnUp">▲</div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 800;
    canvas.height = 600;

    const assets = {
        koji: new Image(), banana: new Image(), enemy: new Image(),
        stone: new Image(), bg: new Image(), ramuan: new Image()
    };
    assets.koji.src = 'koji.png';
    assets.banana.src = 'banana.png';
    assets.enemy.src = 'enemy.png';
    assets.stone.src = 'stone.png';
    assets.bg.src = 'background.png';
    assets.ramuan.src = 'ramuan.png';

    const worldHeight = 4000;
    let cameraY = worldHeight - 600;
    let score = 0;
    let lives = 3;
    let invul = 0;
    let particles = [];

    const koji = {
        x: 400, y: worldHeight - 150, w: 75, h: 75,
        vx: 0, vy: 0, speed: 9, g: 0.8, jump: -18,
        jumps: 0, dir: 1
    };

    let platforms = [];
    let bananas = [];
    let enemies = [];
    let potions = [];

    function initLevel() {
        platforms = [{ x: 0, y: worldHeight - 40, w: 800, h: 40, move: false }];
        
        for (let i = 1; i < 25; i++) {
            let py = (worldHeight - 40) - (i * 150); // Jarak pas untuk sekali lompat
            let pw = 160 + Math.random() * 80;
            let px = Math.random() * (800 - pw);
            
            let plat = { 
                x: px, y: py, w: pw, h: 30, 
                move: i % 3 === 0, // Tiap lantai ke-3 bergerak
                dir: 1, speed: 2 + (Math.random() * 2), startX: px, range: 150 
            };
            platforms.push(plat);

            if (i % 2 === 0) bananas.push({ x: px + 20, y: py - 50, w: 40, h: 40, active: true });
            if (i > 5 && i % 4 === 0) enemies.push({ x: px, y: py - 55, w: 55, h: 55, startX: px, range: pw - 55, dir: 1, speed: 2 });
            if (i % 8 === 0) potions.push({ x: px + pw/2 - 20, y: py - 60, w: 45, h: 45, active: true });
        }
    }
    initLevel();

    const keys = {};
    function handleJump() {
        if (koji.jumps < 2) { 
            koji.vy = koji.jump; 
            koji.jumps++; 
            spawnPart(koji.x + 35, koji.y + 70, '#fff'); 
        }
    }

    window.addEventListener('keydown', e => { if(e.code === 'ArrowUp') handleJump(); keys[e.code] = true; });
    window.addEventListener('keyup', e => keys[e.code] = false);

    function bind(id, code) {
        const b = document.getElementById(id);
        b.ontouchstart = (e) => { e.preventDefault(); if(code === 'ArrowUp') handleJump(); keys[code] = true; };
        b.ontouchend = () => keys[code] = false;
    }
    bind('btnLeft', 'ArrowLeft'); bind('btnRight', 'ArrowRight'); bind('btnUp', 'ArrowUp');

    function spawnPart(x, y, color) {
        for(let i=0; i<8; i++) particles.push({ x, y, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10, life: 15, color });
    }

    function update() {
        if (invul > 0) invul--;

        if (keys['ArrowLeft']) { koji.vx = -koji.speed; koji.dir = -1; }
        else if (keys['ArrowRight']) { koji.vx = koji.speed; koji.dir = 1; }
        else { koji.vx *= 0.8; }

        koji.x += koji.vx;
        koji.vy += koji.g;
        koji.y += koji.vy;

        if (koji.x < 0) koji.x = 0;
        if (koji.x > 725) koji.x = 725;

        // Platform & Move Logic
        platforms.forEach(p => {
            if (p.move) {
                p.x += p.speed * p.dir;
                if (p.x > p.startX + p.range || p.x < p.startX - 50) p.dir *= -1;
            }
            if (koji.vy > 0 && koji.y + koji.h >= p.y && koji.y + koji.h <= p.y + 25 && koji.x + 50 > p.x && koji.x < p.x + p.w) {
                koji.y = p.y - koji.h; koji.vy = 0; koji.jumps = 0;
                if (p.move) koji.x += p.speed * p.dir;
            }
        });

        // Camera strictly follows Koji
        cameraY = koji.y - 300;
        if (cameraY < 0) cameraY = 0;
        if (cameraY > worldHeight - 600) cameraY = worldHeight - 600;

        // Items & Enemies
        bananas.forEach(b => {
            if (b.active && Math.abs(koji.x - b.x) < 40 && Math.abs(koji.y - b.y) < 40) {
                b.active = false; score++; document.getElementById('scoreVal').innerText = score;
                spawnPart(b.x, b.y, 'gold');
            }
        });

        potions.forEach(p => {
            if (p.active && Math.abs(koji.x - p.x) < 40 && Math.abs(koji.y - p.y) < 40) {
                p.active = false; if(lives < 3) lives++; 
                document.getElementById('livesVal').innerText = "❤️".repeat(lives);
                spawnPart(p.x, p.y, 'lime');
            }
        });

        enemies.forEach(e => {
            e.x += e.speed * e.dir;
            if (e.x > e.startX + e.range || e.x < e.startX) e.dir *= -1;
            if (invul === 0 && Math.abs(koji.x - e.x) < 45 && Math.abs(koji.y - e.y) < 45) {
                lives--; invul = 60; document.getElementById('livesVal').innerText = "❤️".repeat(lives);
                if (lives <= 0) location.reload();
            }
        });

        particles.forEach((p, i) => { p.x += p.vx; p.y += p.vy; p.life--; if(p.life <= 0) particles.splice(i, 1); });
    }

    function draw() {
        ctx.fillStyle = '#4dbfff';
        ctx.fillRect(0, 0, 800, 600);
        ctx.save();
        ctx.translate(0, -cameraY);

        if (assets.bg.complete) {
            for (let i = 0; i < worldHeight; i += 600) ctx.drawImage(assets.bg, 0, i, 800, 600);
        }

        platforms.forEach(p => {
            ctx.fillStyle = '#555';
            if (assets.stone.complete) {
                for(let x=0; x<p.w; x+=40) ctx.drawImage(assets.stone, p.x + x, p.y, 40, p.h);
            } else ctx.fillRect(p.x, p.y, p.w, p.h);
        });

        bananas.forEach(b => { if(b.active && assets.banana.complete) ctx.drawImage(assets.banana, b.x, b.y, b.w, b.h); });
        potions.forEach(p => { if(p.active && assets.ramuan.complete) ctx.drawImage(assets.ramuan, p.x, p.y, p.w, p.h); });
        enemies.forEach(e => { if(assets.enemy.complete) ctx.drawImage(assets.enemy, e.x, e.y, e.w, e.h); });

        if (invul % 10 < 5 && assets.koji.complete) {
            ctx.save();
            if (koji.dir === -1) { ctx.translate(koji.x + koji.w, koji.y); ctx.scale(-1, 1); ctx.drawImage(assets.koji, 0, 0, koji.w, koji.h); }
            else ctx.drawImage(assets.koji, koji.x, koji.y, koji.w, koji.h);
            ctx.restore();
        }

        particles.forEach(p => { ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, 4, 4); });
        ctx.restore();
    }

    function loop() { update(); draw(); requestAnimationFrame(loop); }
    loop();
</script>
</body>
</html>
