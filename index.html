<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Koji Pro Adventure</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #000; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
        canvas { border: 2px solid #fff; max-width: 100%; height: auto; background-color: #4dbfff; }
        #ui { position: absolute; top: 15px; left: 15px; color: white; text-shadow: 2px 2px black; z-index: 10; pointer-events: none; }
        .score { font-size: 22px; font-weight: bold; }
        .hearts { color: #ff4d4d; font-size: 26px; margin-top: 5px; }
        .controls { position: fixed; bottom: 20px; right: 20px; display: grid; grid-template-columns: repeat(3, 70px); gap: 10px; }
        .btn { background: rgba(255,255,255,0.2); border: 2px solid #fff; border-radius: 15px; height: 70px; display: flex; justify-content: center; align-items: center; color: white; font-size: 30px; user-select: none; }
        .btn:active { background: rgba(255,255,255,0.5); }
    </style>
</head>
<body>

<div id="ui">
    <div class="score">🍌 SCORE: <span id="scoreText">0</span></div>
    <div class="hearts" id="livesText">❤️ ❤️ ❤️</div>
</div>

<canvas id="gameCanvas"></canvas>

<div class="controls">
    <div class="btn" style="grid-column: 2" id="btnUp">▲</div>
    <div class="btn" style="grid-column: 1; grid-row: 2" id="btnLeft">◀</div>
    <div class="btn" style="grid-column: 3; grid-row: 2" id="btnRight">▶</div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Ukuran Layar
    canvas.width = 800;
    canvas.height = 600;

    const img = {
        koji: new Image(), banana: new Image(), enemy: new Image(),
        stone: new Image(), bg: new Image(), ramuan: new Image()
    };
    img.koji.src = 'koji.png';
    img.banana.src = 'banana.png';
    img.enemy.src = 'enemy.png';
    img.stone.src = 'stone.png';
    img.bg.src = 'background.png';
    img.ramuan.src = 'ramuan.png';

    let score = 0;
    let lives = 3;
    let invul = 0;
    let tick = 0;
    let keys = {};
    let particles = [];

    // Map Settings
    const worldHeight = 2500;
    let cameraY = worldHeight - canvas.height;

    let koji = { x: 400, y: worldHeight - 150, w: 70, h: 70, dy: 0, jump: -20, speed: 7, g: 0.9, grounded: false };

    // Buat Platform Bertingkat & Bergerak
    let platforms = [];
    for(let i = 0; i < 15; i++) {
        platforms.push({
            x: Math.random() * 600,
            y: (worldHeight - 150) - (i * 160),
            w: 180, h: 25,
            move: i % 3 === 0 && i !== 0,
            speed: 2,
            startX: 0
        });
    }
    platforms[0] = { x: 0, y: worldHeight - 40, w: 800, h: 40, move: false }; // Tanah dasar

    // Items
    let bananas = platforms.map((p, i) => ({ x: p.x + 70, y: p.y - 50, w: 40, h: 40, active: i !== 0 }));
    let potion = { x: 400, y: worldHeight - 1200, w: 45, h: 45, active: true };

    // Enemies
    let enemies = [];
    for(let i = 1; i < 8; i++) {
        enemies.push({ x: Math.random() * 600, y: worldHeight - (i * 300), w: 55, h: 55, speed: 2, range: 200, startX: 0 });
    }

    // Controls
    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);

    function setupBtn(id, code) {
        const b = document.getElementById(id);
        b.onmousedown = b.ontouchstart = (e) => { e.preventDefault(); keys[code] = true; };
        b.onmouseup = b.ontouchend = (e) => { e.preventDefault(); keys[code] = false; };
    }
    setupBtn('btnUp', 'ArrowUp'); setupBtn('btnLeft', 'ArrowLeft'); setupBtn('btnRight', 'ArrowRight');

    function createExplosion(x, y, color) {
        for(let i=0; i<8; i++) {
            particles.push({ x, y, dx: (Math.random()-0.5)*10, dy: (Math.random()-0.5)*10, life: 20, color });
        }
    }

    function update() {
        tick++;
        if(invul > 0) invul--;

        if(keys['ArrowLeft'] && koji.x > 0) koji.x -= koji.speed;
        if(keys['ArrowRight'] && koji.x < canvas.width - koji.w) koji.x += koji.speed;
        if(keys['ArrowUp'] && koji.grounded) { koji.dy = koji.jump; koji.grounded = false; }

        koji.dy += koji.g;
        koji.y += koji.dy;

        // Platform Logic
        koji.grounded = false;
        platforms.forEach(p => {
            if(p.move) {
                if(p.startX === 0) p.startX = p.x;
                p.x += p.speed;
                if(p.x > 620 || p.x < 0) p.speed *= -1;
            }
            if(koji.dy >= 0 && koji.y + koji.h <= p.y + p.h && koji.y + koji.h >= p.y - 10 &&
               koji.x + koji.w > p.x && koji.x < p.x + p.w) {
                koji.y = p.y - koji.h;
                koji.dy = 0;
                koji.grounded = true;
                if(p.move) koji.x += p.speed;
            }
        });

        // Camera Follow
        let targetCam = koji.y - canvas.height / 2;
        cameraY += (targetCam - cameraY) * 0.1;
        if(cameraY < 0) cameraY = 0;
        if(cameraY > worldHeight - canvas.height) cameraY = worldHeight - canvas.height;

        // Collect Banana
        bananas.forEach(b => {
            if(b.active && koji.x < b.x + b.w && koji.x + koji.w > b.x && koji.y < b.y + b.h && koji.y + koji.h > b.y) {
                b.active = false; score++; document.getElementById('scoreText').innerText = score;
                createExplosion(b.x+20, b.y+20, 'gold');
                setTimeout(() => b.active = true, 5000); // Respawn 5 detik
            }
        });

        // Collect Potion
        if(potion.active && koji.x < potion.x + potion.w && koji.x + koji.w > potion.x && koji.y < potion.y + potion.h && koji.y + koji.h > potion.y) {
            if(lives < 3) { lives++; updateLives(); potion.active = false; createExplosion(potion.x+20, potion.y+20, 'lime'); }
            setTimeout(() => potion.active = true, 15000);
        }

        // Enemy Collision
        enemies.forEach(e => {
            if(e.startX === 0) e.startX = e.x;
            e.x += e.speed;
            if(e.x > e.startX + e.range || e.x < e.startX || e.x > 750 || e.x < 0) e.speed *= -1;
            if(invul === 0 && koji.x < e.x + e.w && koji.x + koji.w > e.x && koji.y < e.y + e.h && koji.y + koji.h > e.y) {
                lives--; invul = 60; updateLives();
                createExplosion(koji.x+35, koji.y+35, 'red');
                if(lives <= 0) location.reload();
            }
        });

        particles.forEach((p, i) => { p.x += p.dx; p.y += p.dy; p.life--; if(p.life <= 0) particles.splice(i, 1); });
    }

    function updateLives() {
        let h = ""; for(let i=0; i<lives; i++) h += "❤️ ";
        document.getElementById('livesText').innerText = h;
    }

    function draw() {
        // BERSIHKAN LAYAR TOTAL (MENGHAPUS BAYANGAN)
        ctx.fillStyle = "#4dbfff";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.save();
        ctx.translate(0, -cameraY);

        // Background Berulang
        if(img.bg.complete) {
            for(let i=0; i<worldHeight; i+=canvas.height) ctx.drawImage(img.bg, 0, i, canvas.width, canvas.height);
        }

        // Platforms
        platforms.forEach(p => {
            ctx.fillStyle = "#333";
            ctx.fillRect(p.x, p.y, p.w, p.h);
            if(img.stone.complete) {
                for(let x=p.x; x<p.x+p.w; x+=40) ctx.drawImage(img.stone, x, p.y, 40, p.h);
            }
        });

        // Items
        bananas.forEach(b => { if(b.active && img.banana.complete) ctx.drawImage(img.banana, b.x, b.y + Math.sin(tick*0.1)*5, b.w, b.h); });
        if(potion.active && img.ramuan.complete) ctx.drawImage(img.ramuan, potion.x, potion.y, potion.w, potion.h);

        // Enemies
        enemies.forEach(e => { if(img.enemy.complete) ctx.drawImage(img.enemy, e.x, e.y, e.w, e.h); });

        // Koji
        if(invul % 10 < 5 && img.koji.complete) ctx.drawImage(img.koji, koji.x, koji.y, koji.w, koji.h);

        // Particles
        particles.forEach(p => { ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, 4, 4); });

        ctx.restore();
    }

    function loop() { update(); draw(); requestAnimationFrame(loop); }
    img.bg.onload = loop;
    // Fallback jika gambar lama dimuat
    setTimeout(loop, 1000);
</script>
</body>
</html>
