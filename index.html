<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koji Jungle Adventure - Potion Update</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #eee; }
        canvas { border: 1px solid black; }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="800" height="600"></canvas> <script>
    // Konfigurasi Dasar
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Memuat Gambar (Gunakan file .png transparan yang Anda simpan)
    const kojiImg = new Image(); kojiImg.src = 'koji.png'; // Ganti dengan nama file Koji Anda
    const bananaImg = new Image(); bananaImg.src = 'banana.png'; // Ganti dengan nama file pisang Anda
    const enemyImg = new Image(); enemyImg.src = 'enemy.png'; // Ganti dengan nama file musuh Anda
    const jungleBg = new Image(); jungleBg.src = 'hutan.png';

    // Muat Gambar Baru
    const stoneImg = new Image(); stoneImg.src = 'stone.png';
    const boxImg = new Image(); boxImg.src = 'box.png';
    const potionImg = new Image(); potionImg.src = 'ramuan.png'; // Muat koin ramuan emas baru

    // State Game
    let isGameOver = false;
    let score = 0;
    let lives = 3; // Menambahkan sistem nyawa
    let keys = {};

    // Karakter Koji
    let koji = {
        x: 50,
        y: 500, // Mulai dari lantai bawah
        width: 60,
        height: 60,
        speed: 5,
        dy: 0,
        gravity: 0.8,
        jumpPower: -18, // Lompatan lebih tinggi untuk platform bergerak
        grounded: false
    };

    // Item Pisang (Diletakkan di tempat tinggi)
    let bananas = [
        { x: 300, y: 320, width: 30, height: 30, collected: false },
        { x: 600, y: 180, width: 30, height: 30, collected: false },
        { x: 700, y: 40, width: 30, height: 30, collected: false }
    ];

    // Ramuan Penyembuh Baru
    let potions = [
        { x: 450, y: 420, width: 30, height: 30, collected: false } // Diletakkan di platform melayang rendah
    ];

    // Musuh
    let enemies = [
        { x: 350, y: 500, width: 40, height: 40, speed: 2, range: 100, startX: 350 },
        { x: 650, y: 300, width: 40, height: 40, speed: 1.5, range: 150, startX: 650 }
    ];

    // Rintangan (Batu & Box)
    let obstacles = [
        { x: 400, y: 510, width: 40, height: 40, type: 'stone' },
        { x: 600, y: 310, width: 40, height: 40, type: 'box' }
    ];

    // DAFTAR PLATFORM MELAYANG BERTINGKAT BARU
    let platforms = [
        { x: 0, y: 580, width: 800, height: 20 }, // Lantai Dasar
        { x: 100, y: 500, width: 200, height: 20 },
        { x: 400, y: 420, width: 150, height: 20 }, // Platform bergerak rendah
        { x: 600, y: 320, width: 200, height: 20 },
        { x: 200, y: 220, width: 150, height: 20 }, // Platform bergerak tengah
        { x: 400, y: 120, width: 250, height: 20 },
        { x: 650, y: 20, width: 150, height: 20 }  // Puncak tertinggi
    ];

    // Kontrol Input
    document.addEventListener('keydown', e => keys[e.code] = true);
    document.addEventListener('keyup', e => keys[e.code] = false);

    // Loop Game Utama
    function gameLoop() {
        if (!isGameOver) {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
    }

    // Update Logika Game
    function update() {
        // Gerakan Koji
        if (keys['ArrowLeft'] && koji.x > 0) koji.x -= koji.speed;
        if (keys['ArrowRight'] && koji.x < canvas.width - koji.w) koji.x += koji.speed;
        if (keys['Space'] && koji.grounded) { koji.dy = koji.jumpPower; koji.grounded = false; }
        koji.dy += koji.gravity; koji.y += koji.dy;

        // Cek Tabrakan Platform (Melompat di atas platform)
        koji.grounded = false;
        platforms.forEach(p => {
            if (checkCollision(koji, p)) {
                if (koji.dy >= 0 && koji.y + koji.height <= p.y + p.height) { // Jatuh dari atas
                    koji.y = p.y - koji.height;
                    koji.dy = 0;
                    koji.grounded = true;
                }
            }
        });

        // Tabrakan 'Tanah' Dasar (Jika jatuh dari platform terendah)
        if (koji.y >= 580) { koji.y = 580; koji.dy = 0; koji.grounded = true; }

        // Koleksi Pisang
        bananas.forEach(banana => { if (!banana.collected && checkCollision(koji, banana)) { banana.collected = true; score++; } });

        // KOLEKSI RAMUAN PENYEMBUH
        potions.forEach(potion => { 
            if (!potion.collected && checkCollision(koji, potion)) { 
                potion.collected = true; 
                lives = Math.min(lives + 1, 3); // Tambah nyawa, maksimal 3
            } 
        });

        // Update Gerakan Musuh
        enemies.forEach(enemy => {
            enemy.x += enemy.speed;
            if (enemy.x > enemy.startX + enemy.range || enemy.x < enemy.startX) { enemy.speed = -enemy.speed; }
        });

        // Tabrakan dengan Musuh (GAME OVER)
        enemies.forEach(enemy => { if (checkCollision(koji, enemy)) { endGame(); } });

        // Tabrakan dengan Rintangan
        obstacles.forEach(obstacle => {
            if (checkCollision(koji, obstacle)) {
                if (koji.speed > 0) { koji.x = obstacle.x - koji.width; }
                else if (koji.speed < 0) { koji.x = obstacle.x + obstacle.width; }
            }
        });
    }

    // Menggambar di Canvas
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Gambar Latar Belakang
        if (jungleBg.complete) ctx.drawImage(jungleBg, 0, 0, canvas.width, canvas.height);

        // Gambar Koji
        if (kojiImg.complete) ctx.drawImage(kojiImg, koji.x, koji.y, koji.width, koji.height);

        // Gambar Pisang
        bananas.forEach(banana => { if (!banana.collected && bananaImg.complete) ctx.drawImage(bananaImg, banana.x, banana.y, banana.width, banana.height); });

        // GAMBAR RAMUAN PENYEMBUH BARU
        potions.forEach(potion => { if (!potion.collected && potionImg.complete) ctx.drawImage(potionImg, potion.x, potion.y, potion.width, potion.height); });

        // Gambar Musuh
        enemies.forEach(enemy => { if (enemyImg.complete) ctx.drawImage(enemyImg, enemy.x, enemy.y, enemy.width, enemy.height); });

        // Gambar Rintangan
        obstacles.forEach(obstacle => {
            if (obstacle.type === 'stone' && stoneImg.complete) ctx.drawImage(stoneImg, obstacle.x, obstacle.y, obstacle.width, obstacle.height);
            else if (obstacle.type === 'box' && boxImg.complete) ctx.drawImage(boxImg, obstacle.x, obstacle.y, obstacle.width, obstacle.height);
        });

        // GAMBAR PLATFORM BARU
        platforms.forEach(p => { ctx.fillStyle = "#555"; ctx.fillRect(p.x, p.y, p.width, p.height); });

        // Gambar Skor & Nyawa
        ctx.fillStyle = 'white'; ctx.font = '24px Arial'; ctx.fillText('Bananas: ' + score, 15, 30);
        ctx.fillText('Lives: ' + lives, 15, 60); // Menampilkan nyawa
    }

    // Cek Tabrakan
    function checkCollision(rect1, rect2) {
        return rect1.x < rect2.x + rect2.width && rect1.x + rect1.width > rect2.x && rect1.y < rect2.y + rect2.height && rect1.y + rect1.height > rect2.y;
    }

    function endGame() { isGameOver = true; console.log('Game Over! Skor Anda:', score); }

    // Mulai game setelah gambar dimuat
    stoneImg.onload = boxImg.onload = potionImg.onload = jungleBg.onload = kojiImg.onload = bananaImg.onload = enemyImg.onload = function() { gameLoop(); };
</script>
</body>
</html>
