<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Koji Jungle Adventure</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #1a1a1a; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
        canvas { border: 3px solid #fff; max-width: 95%; height: auto; background-color: #4dbfff; }
        #ui-layer { position: absolute; top: 10px; left: 10px; color: #fff; font-size: 22px; text-shadow: 2px 2px #000; z-index: 5; }
        
        /* Navigasi Layar Sentuh */
        .controls { position: fixed; bottom: 30px; right: 30px; display: grid; grid-template-columns: repeat(3, 70px); grid-template-rows: repeat(2, 70px); gap: 10px; z-index: 10; }
        .btn { background: rgba(255, 255, 255, 0.2); border: 2px solid #fff; border-radius: 15px; display: flex; justify-content: center; align-items: center; color: white; font-size: 30px; user-select: none; -webkit-tap-highlight-color: transparent; cursor: pointer; }
        .btn:active { background: rgba(255, 255, 255, 0.5); transform: scale(0.95); }
        .up { grid-column: 2; }
        .left { grid-column: 1; grid-row: 2; }
        .right { grid-column: 3; grid-row: 2; }
    </style>
</head>
<body>

<div id="ui-layer">🍌 BANANAS: <span id="score">0</span></div>

<canvas id="gameCanvas" width="800" height="400"></canvas>

<div class="controls">
    <div class="btn up" id="btnUp">▲</div>
    <div class="btn left" id="btnLeft">◀</div>
    <div class="btn right" id="btnRight">▶</div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');

    const img = {
        koji: new Image(),
        banana: new Image(),
        enemy: new Image(),
        box: new Image(),
        stone: new Image(),
        bg: new Image()
    };

    // SINKRONISASI NAMA FILE SESUAI REPOSITORI (SEMUA .png)
    img.bg.src = 'background.png';
    img.koji.src = 'koji.png';
    img.banana.src = 'banana.png';
    img.enemy.src = 'enemy.png';
    img.box.src = 'box.png';
    img.stone.src = 'stone.png';

    let score = 0;
    let gameTick = 0;
    let keys = {};

    let koji = { x: 50, y: 280, w: 80, h: 80, dy: 0, jump: -16, speed: 6, g: 0.9, grounded: false };
    let bananas = [
        { x: 320, y: 210, w: 45, h: 45, collected: false },
        { x: 580, y: 160, w: 45, h: 45, collected: false }
    ];
    let enemies = [{ x: 450, y: 305, w: 55, h: 55, speed: 2.2, range: 160, startX: 450 }];
    let obstacles = [
        { x: 220, y: 310, w: 60, h: 60, img: img.box },
        { x: 520, y: 310, w: 65, h: 65, img: img.stone }
    ];

    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);

    function setupBtn(id, code) {
        const btn = document.getElementById(id);
        const action = (e) => { e.preventDefault(); keys[code] = true; };
        const stop = (e) => { e.preventDefault(); keys[code] = false; };
        btn.addEventListener('touchstart', action);
        btn.addEventListener('touchend', stop);
        btn.addEventListener('mousedown', action);
        btn.addEventListener('mouseup', stop);
    }

    setupBtn('btnUp', 'ArrowUp');
    setupBtn('btnLeft', 'ArrowLeft');
    setupBtn('btnRight', 'ArrowRight');

    function update() {
        gameTick++;
        if (keys['ArrowLeft'] && koji.x > 0) koji.x -= koji.speed;
        if (keys['ArrowRight'] && koji.x < canvas.width - koji.w) koji.x += koji.speed;
        if (keys['ArrowUp'] && koji.grounded) { koji.dy = koji.jump; koji.grounded = false; }

        koji.dy += koji.g;
        koji.y += koji.dy;
        if (koji.y > 280) { koji.y = 280; koji.dy = 0; koji.grounded = true; }

        bananas.forEach((b, i) => {
            if (!b.collected) {
                b.renderY = b.y + Math.sin((gameTick + i * 20) * 0.1) * 8;
                if (koji.x < b.x + b.w && koji.x + koji.w > b.x && koji.y < b.renderY + b.h && koji.y + koji.h > b.renderY) {
                    b.collected = true; score++; scoreEl.innerText = score;
                }
            }
        });

        enemies.forEach(e => {
            e.x += e.speed;
            if (e.x > e.startX + e.range || e.x < e.startX) e.speed *= -1;
        });
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (img.bg.complete) ctx.drawImage(img.bg, 0, 0, canvas.width, canvas.height);
        obstacles.forEach(o => { if (o.img.complete) ctx.drawImage(o.img, o.x, o.y, o.w, o.h); });
        bananas.forEach(b => { if (!b.collected && img.banana.complete) ctx.drawImage(img.banana, b.x, b.renderY || b.y, b.w, b.h); });
        enemies.forEach(e => {
            if (img.enemy.complete) {
                ctx.save();
                if (e.speed < 0) { ctx.translate(e.x + e.w, e.y); ctx.scale(-1, 1); ctx.drawImage(img.enemy, 0, 0, e.w, e.h); }
                else { ctx.drawImage(img.enemy, e.x, e.y, e.w, e.h); }
                ctx.restore();
            }
        });
        if (img.koji.complete) ctx.drawImage(img.koji, koji.x, koji.y, koji.w, koji.h);
    }

    function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }

    let loaded = 0;
    Object.values(img).forEach(i => {
        i.onload = () => { if (++loaded === 6) gameLoop(); };
        i.onerror = () => { console.error("Gagal muat:", i.src); loaded++; if (loaded === 6) gameLoop(); };
    });
</script>
</body>
</html>
