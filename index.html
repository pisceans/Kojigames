<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Koji Adventure - $ANIMAL Edition</title>
    <style>
        * { box-sizing: border-box; touch-action: none; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; padding: 0; background: #000; display: flex; flex-direction: column; height: 100vh; font-family: sans-serif; overflow: hidden; }
        
        /* Layar Game */
        #game-container { position: relative; width: 100%; height: 65vh; background: #4dbfff; overflow: hidden; }
        canvas { width: 100%; height: 100%; display: block; image-rendering: pixelated; }

        /* UI Hud */
        #hud { position: absolute; top: 10px; left: 10px; z-index: 20; }
        .hud-box { background: rgba(0,0,0,0.7); padding: 10px 15px; border-radius: 12px; border: 2px solid #ffcc00; color: white; }
        .score { color: #ffcc00; font-weight: bold; font-size: 18px; margin-bottom: 5px; }

        /* Area Kontrol Bawah */
        #controls-area { width: 100%; height: 35vh; background: #111; display: flex; justify-content: flex-end; align-items: center; padding-right: 30px; }

        /* D-Pad Segitiga di Pojok Kanan Bawah */
        .d-pad { display: grid; grid-template-columns: repeat(3, 65px); grid-template-rows: repeat(2, 65px); gap: 10px; }
        .btn { width: 65px; height: 65px; background: #333; border: 2px solid #eee; border-radius: 12px; display: flex; justify-content: center; align-items: center; color: white; font-size: 28px; }
        .btn:active { background: #555; transform: scale(0.9); }
        .up { grid-column: 2; grid-row: 1; border-color: #ffcc00; color: #ffcc00; }
        .left { grid-column: 1; grid-row: 2; }
        .right { grid-column: 3; grid-row: 2; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="hud">
        <div class="hud-box">
            <div class="score">💰 $ANIMAL: <span id="scoreVal">0</span></div>
            <div id="livesVal">❤️❤️❤️</div>
        </div>
    </div>
    <canvas id="gameCanvas"></canvas>
</div>

<div id="controls-area">
    <div class="d-pad">
        <div class="btn up" id="btnUp">▲</div>
        <div class="btn left" id="btnLeft">◀</div>
        <div class="btn right" id="btnRight">▶</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 800; canvas.height = 600;

    const assets = {
        koji: new Image(), banana: new Image(), enemy: new Image(),
        stone: new Image(), bg: new Image(), ramuan: new Image()
    };
    assets.koji.src = 'koji.png';
    assets.banana.src = 'banana.png';
    assets.enemy.src = 'enemy.png';
    assets.stone.src = 'stone.png';
    assets.bg.src = 'background.png';
    assets.ramuan.src = 'ramuan.png';

    const worldHeight = 4000;
    let cameraY = worldHeight - 600;
    let score = 0; let lives = 3; let invul = 0;
    let platforms = []; let bananas = []; let enemies = []; let potions = [];

    const koji = { x: 400, y: worldHeight - 150, w: 70, h: 70, vx: 0, vy: 0, speed: 8, g: 0.8, jump: -17, jumps: 0, dir: 1 };

    function initLevel() {
        platforms = [{ x: 0, y: worldHeight - 40, w: 800, h: 40, move: false }];
        for (let i = 1; i < 30; i++) {
            let py = (worldHeight - 40) - (i * 155);
            let pw = 150 + Math.random() * 100;
            let px = Math.random() * (800 - pw);
            platforms.push({ x: px, y: py, w: pw, h: 30, move: i % 4 === 0, dir: 1, speed: 2, startX: px, range: 120 });
            
            if (i % 2 === 0) bananas.push({ x: px + 30, y: py - 50, w: 40, h: 40, active: true });
            if (i % 3 === 0) enemies.push({ x: px, y: py - 55, w: 55, h: 55, startX: px, range: pw - 55, dir: 1, speed: 2.5 });
            if (i % 7 === 0) potions.push({ x: px + 20, y: py - 60, w: 45, h: 45, active: true });
        }
    }
    initLevel();

    const keys = {};
    function handleJump() { if (koji.jumps < 2) { koji.vy = koji.jump; koji.jumps++; } }

    function bind(id, code) {
        const b = document.getElementById(id);
        b.ontouchstart = (e) => { e.preventDefault(); if(code === 'ArrowUp') handleJump(); keys[code] = true; };
        b.ontouchend = () => keys[code] = false;
    }
    bind('btnLeft', 'ArrowLeft'); bind('btnRight', 'ArrowRight'); bind('btnUp', 'ArrowUp');

    function update() {
        if (invul > 0) invul--;
        if (keys['ArrowLeft']) { koji.vx = -koji.speed; koji.dir = -1; }
        else if (keys['ArrowRight']) { koji.vx = koji.speed; koji.dir = 1; }
        else { koji.vx *= 0.8; }
        
        koji.x += koji.vx; koji.vy += koji.g; koji.y += koji.vy;
        if (koji.x < 0) koji.x = 0; if (koji.x > 730) koji.x = 730;

        platforms.forEach(p => {
            if (p.move) { p.x += p.speed * p.dir; if (p.x > p.startX + p.range || p.x < p.startX) p.dir *= -1; }
            if (koji.vy > 0 && koji.y + koji.h >= p.y && koji.y + koji.h <= p.y + 20 && koji.x + 40 > p.x && koji.x < p.x + p.w) {
                koji.y = p.y - koji.h; koji.vy = 0; koji.jumps = 0;
            }
        });

        cameraY = koji.y - 300;
        if (cameraY < 0) cameraY = 0;
        if (cameraY > worldHeight - 600) cameraY = worldHeight - 600;

        bananas.forEach(b => {
            if (b.active && Math.abs(koji.x - b.x) < 40 && Math.abs(koji.y - b.y) < 40) { b.active = false; score++; document.getElementById('scoreVal').innerText = score; }
        });

        potions.forEach(p => {
            if (p.active && Math.abs(koji.x - p.x) < 40 && Math.abs(koji.y - p.y) < 40) { p.active = false; if(lives < 3) lives++; document.getElementById('livesVal').innerText = "❤️".repeat(lives); }
        });

        enemies.forEach(e => {
            e.x += e.speed * e.dir; if (e.x > e.startX + e.range || e.x < e.startX) e.dir *= -1;
            if (invul === 0 && Math.abs(koji.x - e.x) < 45 && Math.abs(koji.y - e.y) < 45) { lives--; invul = 60; document.getElementById('livesVal').innerText = "❤️".repeat(lives); if (lives <= 0) location.reload(); }
        });
    }

    function draw() {
        ctx.fillStyle = '#4dbfff'; ctx.fillRect(0, 0, 800, 600);
        ctx.save(); ctx.translate(0, -cameraY);
        if (assets.bg.complete) { for (let i = 0; i < worldHeight; i += 600) ctx.drawImage(assets.bg, 0, i, 800, 600); }
        platforms.forEach(p => {
            if (assets.stone.complete) { for(let x=0; x<p.w; x+=40) ctx.drawImage(assets.stone, p.x + x, p.y, 40, p.h); }
        });
        bananas.forEach(b => { if(b.active && assets.banana.complete) ctx.drawImage(assets.banana, b.x, b.y, b.w, b.h); });
        potions.forEach(p => { if(p.active && assets.ramuan.complete) ctx.drawImage(assets.ramuan, p.x, p.y, p.w, p.h); });
        enemies.forEach(e => { if(assets.enemy.complete) ctx.drawImage(assets.enemy, e.x, e.y, e.w, e.h); });
        if (invul % 10 < 5 && assets.koji.complete) {
            ctx.save();
            if (koji.dir === -1) { ctx.translate(koji.x + koji.w, koji.y); ctx.scale(-1, 1); ctx.drawImage(assets.koji, 0, 0, koji.w, koji.h); }
            else ctx.drawImage(assets.koji, koji.x, koji.y, koji.w, koji.h);
            ctx.restore();
        }
        ctx.restore();
    }

    function loop() { update(); draw(); requestAnimationFrame(loop); }
    loop();
</script>
</body>
</html>
