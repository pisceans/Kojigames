<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Koji Jungle Climb</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #1a1a1a; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; font-family: Arial, sans-serif; }
        canvas { border: 3px solid #fff; max-width: 95%; height: auto; background-color: #4dbfff; }
        #ui-layer { position: absolute; top: 20px; left: 20px; color: #fff; text-shadow: 2px 2px #000; z-index: 5; }
        .stats { font-size: 20px; margin-bottom: 5px; }
        .hearts { color: #ff4d4d; font-size: 24px; }
        
        /* Kontrol Mobile */
        .controls { position: fixed; bottom: 20px; right: 20px; display: grid; grid-template-columns: repeat(3, 70px); grid-template-rows: repeat(2, 70px); gap: 10px; }
        .btn { background: rgba(255, 255, 255, 0.3); border: 2px solid #fff; border-radius: 15px; display: flex; justify-content: center; align-items: center; color: white; font-size: 30px; user-select: none; }
        .up { grid-column: 2; }
        .left { grid-column: 1; grid-row: 2; }
        .right { grid-column: 3; grid-row: 2; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div class="stats">🍌 BANANAS: <span id="score">0</span></div>
    <div class="hearts" id="hearts-display">❤️ ❤️ ❤️</div>
</div>

<canvas id="gameCanvas" width="800" height="450"></canvas>

<div class="controls">
    <div class="btn up" id="btnUp">▲</div>
    <div class="btn left" id="btnLeft">◀</div>
    <div class="btn right" id="btnRight">▶</div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const img = {
        koji: new Image(), banana: new Image(), enemy: new Image(),
        stone: new Image(), bg: new Image()
    };
    // Sesuaikan dengan file asli Anda
    img.koji.src = 'koji.png';
    img.banana.src = 'banana.png';
    img.enemy.src = 'enemy.png';
    img.stone.src = 'stone.png';
    img.bg.src = 'background.png';

    let score = 0;
    let lives = 3;
    let isInvulnerable = 0; // Waktu kebal sementara setelah kena musuh
    let gameTick = 0;
    let keys = {};

    let koji = { x: 50, y: 350, w: 70, h: 70, dy: 0, jump: -15, speed: 6, g: 0.8, grounded: false };

    // DAFTAR LANTAI (PLATFORM) UNTUK MEMANJAT
    let platforms = [
        { x: 0, y: 420, w: 800, h: 30 },   // Tanah Dasar
        { x: 200, y: 320, w: 200, h: 20 }, // Lantai 1
        { x: 500, y: 250, w: 200, h: 20 }, // Lantai 2
        { x: 150, y: 160, w: 200, h: 20 }, // Lantai 3
        { x: 450, y: 100, w: 250, h: 20 }  // Lantai 4 (Puncak)
    ];

    let bananas = [
        { x: 250, y: 270, w: 40, h: 40, collected: false },
        { x: 550, y: 200, w: 40, h: 40, collected: false },
        { x: 180, y: 110, w: 40, h: 40, collected: false }
    ];

    let enemies = [
        { x: 400, y: 375, w: 45, h: 45, speed: 2.5, range: 300, startX: 400 },
        { x: 500, y: 205, w: 45, h: 45, speed: 2, range: 150, startX: 500 }
    ];

    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);

    function setupBtn(id, code) {
        const btn = document.getElementById(id);
        btn.addEventListener('touchstart', (e) => { e.preventDefault(); keys[code] = true; });
        btn.addEventListener('touchend', (e) => { e.preventDefault(); keys[code] = false; });
    }
    setupBtn('btnUp', 'ArrowUp'); setupBtn('btnLeft', 'ArrowLeft'); setupBtn('btnRight', 'ArrowRight');

    function update() {
        gameTick++;
        if (isInvulnerable > 0) isInvulnerable--;

        if (keys['ArrowLeft'] && koji.x > 0) koji.x -= koji.speed;
        if (keys['ArrowRight'] && koji.x < canvas.width - koji.w) koji.x += koji.speed;
        if (keys['ArrowUp'] && koji.grounded) { koji.dy = koji.jump; koji.grounded = false; }

        koji.dy += koji.g;
        koji.y += koji.dy;

        // Logika Berdiri di Atas Lantai
        koji.grounded = false;
        platforms.forEach(p => {
            if (koji.dy >= 0 && koji.y + koji.h <= p.y + p.h && koji.y + koji.h >= p.y - 5 &&
                koji.x + koji.w > p.x && koji.x < p.x + p.w) {
                koji.y = p.y - koji.h;
                koji.dy = 0;
                koji.grounded = true;
            }
        });

        // Pisang Bergerak & Diambil
        bananas.forEach((b, i) => {
            if (!b.collected) {
                b.animY = b.y + Math.sin((gameTick + i * 20) * 0.1) * 10;
                if (koji.x < b.x + b.w && koji.x + koji.w > b.x && koji.y < b.animY + b.h && koji.y + koji.h > b.animY) {
                    b.collected = true; score++; document.getElementById('score').innerText = score;
                }
            }
        });

        // Musuh & Pengurangan Nyawa
        enemies.forEach(e => {
            e.x += e.speed;
            if (e.x > e.startX + e.range || e.x < e.startX) e.speed *= -1;

            if (isInvulnerable === 0 && koji.x < e.x + e.w && koji.x + koji.w > e.x && koji.y < e.y + e.h && koji.y + koji.h > e.y) {
                lives--;
                isInvulnerable = 60; // Kebal 1 detik (60 frame)
                updateHearts();
                if (lives <= 0) { alert("Game Over! Skor Anda: " + score); location.reload(); }
            }
        });
    }

    function updateHearts() {
        let display = "";
        for (let i = 0; i < lives; i++) display += "❤️ ";
        document.getElementById('hearts-display').innerText = display;
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (img.bg.complete) ctx.drawImage(img.bg, 0, 0, canvas.width, canvas.height);

        // Gambar Lantai
        platforms.forEach(p => {
            if (img.stone.complete) {
                for (let x = p.x; x < p.x + p.w; x += 25) ctx.drawImage(img.stone, x, p.y, 25, p.h);
            } else {
                ctx.fillStyle = "#555"; ctx.fillRect(p.x, p.y, p.w, p.h);
            }
        });

        bananas.forEach(b => { 
            if (!b.collected && img.banana.complete) ctx.drawImage(img.banana, b.x, b.animY || b.y, b.w, b.h); 
        });

        enemies.forEach(e => { if (img.enemy.complete) ctx.drawImage(img.enemy, e.x, e.y, e.w, e.h); });

        // Efek kedip saat Koji kebal
        if (isInvulnerable % 10 < 5 && img.koji.complete) {
            ctx.drawImage(img.koji, koji.x, koji.y, koji.w, koji.h);
        }
    }

    function loop() { update(); draw(); requestAnimationFrame(loop); }
    img.bg.onload = loop;
</script>
</body>
</html>
