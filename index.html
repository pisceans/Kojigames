<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Koji Jungle Adventure</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #1a1a1a; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
        canvas { border: 3px solid #fff; max-width: 95%; height: auto; background-color: #4dbfff; }
        #ui-layer { position: absolute; top: 10px; left: 10px; color: #fff; font-size: 20px; text-shadow: 2px 2px #000; z-index: 5; }
        
        /* Gaya Tombol Kontrol (D-Pad) */
        .controls { position: fixed; bottom: 20px; right: 20px; display: grid; grid-template-columns: repeat(3, 60px); grid-template-rows: repeat(2, 60px); gap: 10px; z-index: 10; }
        .btn { background: rgba(255, 255, 255, 0.3); border: 2px solid #fff; border-radius: 10px; display: flex; justify-content: center; align-items: center; color: white; font-size: 24px; user-select: none; -webkit-tap-highlight-color: transparent; }
        .btn:active { background: rgba(255, 255, 255, 0.6); }
        .up { grid-column: 2; }
        .left { grid-column: 1; grid-row: 2; }
        .down { grid-column: 2; grid-row: 2; }
        .right { grid-column: 3; grid-row: 2; }
    </style>
</head>
<body>

<div id="ui-layer">🍌 BANANAS: <span id="score">0</span></div>

<canvas id="gameCanvas" width="800" height="400"></canvas>

<div class="controls">
    <div class="btn up" id="btnUp">▲</div>
    <div class="btn left" id="btnLeft">◀</div>
    <div class="btn down" id="btnDown">▼</div>
    <div class="btn right" id="btnRight">▶</div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // Perbaikan Case Sensitivity: Gunakan nama file yang tepat sesuai upload
    const img = {
        koji: new Image(),
        banana: new Image(),
        enemy: new Image(),
        box: new Image(),
        stone: new Image(),
        bg: new Image()
    };

    img.koji.src = 'Koji.png'; // Pastikan di GitHub namanya Koji.png (K kapital)
    img.banana.src = 'banana.png';
    img.enemy.src = 'enemy.png';
    img.box.src = 'box.png';
    img.stone.src = 'stone.png';
    img.bg.src = 'background.png';

    let score = 0;
    let gameTick = 0;
    let keys = {};

    let koji = { x: 50, y: 280, w: 70, h: 70, dy: 0, jump: -15, speed: 5, g: 0.8, grounded: false };
    let bananas = [{ x: 300, y: 200, w: 35, h: 35, collected: false }, { x: 550, y: 150, w: 35, h: 35, collected: false }];
    let enemies = [{ x: 400, y: 305, w: 50, h: 50, speed: 2, range: 150, startX: 400 }];
    let obstacles = [{ x: 200, y: 310, w: 50, h: 50, img: img.box }, { x: 500, y: 310, w: 55, h: 55, img: img.stone }];

    // Kontrol Keyboard & Touch
    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);

    function setupBtn(id, code) {
        const btn = document.getElementById(id);
        btn.addEventListener('touchstart', (e) => { e.preventDefault(); keys[code] = true; });
        btn.addEventListener('touchend', (e) => { e.preventDefault(); keys[code] = false; });
        btn.addEventListener('mousedown', () => keys[code] = true);
        btn.addEventListener('mouseup', () => keys[code] = false);
    }

    setupBtn('btnUp', 'ArrowUp');
    setupBtn('btnLeft', 'ArrowLeft');
    setupBtn('btnRight', 'ArrowRight');

    function update() {
        gameTick++;
        if (keys['ArrowLeft'] && koji.x > 0) koji.x -= koji.speed;
        if (keys['ArrowRight'] && koji.x < canvas.width - koji.w) koji.x += koji.speed;
        if (keys['ArrowUp'] && koji.grounded) { koji.dy = koji.jump; koji.grounded = false; }

        koji.dy += koji.g;
        koji.y += koji.dy;
        if (koji.y > 280) { koji.y = 280; koji.dy = 0; koji.grounded = true; }

        bananas.forEach((b, i) => {
            if (!b.collected) {
                b.renderY = b.y + Math.sin((gameTick + i * 20) * 0.1) * 7;
                if (koji.x < b.x + b.w && koji.x + koji.w > b.x && koji.y < b.renderY + b.h && koji.y + koji.h > b.renderY) {
                    b.collected = true; score++; document.getElementById('score').innerText = score;
                }
            }
        });

        enemies.forEach(e => {
            e.x += e.speed;
            if (e.x > e.startX + e.range || e.x < e.startX) e.speed *= -1;
        });
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (img.bg.complete) ctx.drawImage(img.bg, 0, 0, canvas.width, canvas.height);
        
        obstacles.forEach(o => { if (o.img.complete) ctx.drawImage(o.img, o.x, o.y, o.w, o.h); });
        
        bananas.forEach(b => { if (!b.collected && img.banana.complete) ctx.drawImage(img.banana, b.x, b.renderY || b.y, b.w, b.h); });

        enemies.forEach(e => {
            if (img.enemy.complete) {
                ctx.save();
                if (e.speed < 0) { ctx.translate(e.x + e.w, e.y); ctx.scale(-1, 1); ctx.drawImage(img.enemy, 0, 0, e.w, e.h); }
                else { ctx.drawImage(img.enemy, e.x, e.y, e.w, e.h); }
                ctx.restore();
            }
        });

        // Gambar Koji (Paling Atas)
        if (img.koji.complete) {
            ctx.drawImage(img.koji, koji.x, koji.y, koji.w, koji.h);
        }
    }

    function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }

    let loaded = 0;
    Object.values(img).forEach(i => i.onload = () => { if (++loaded === 6) gameLoop(); });
</script>
</body>
</html>
